<!-- NiRo.ai - Detailed Logo -->
<!-- Features: Flowing petals, multiple hands motif, DevOps elements -->
<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="lavenderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="glowGrad">
      <stop offset="0%" style="stop-color:#f0abfc;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f0abfc;stop-opacity:0" />
    </radialGradient>

    <!-- Filter for glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background with subtle pattern -->
  <rect width="400" height="400" fill="#0f172a"/>

  <!-- Glow effect background -->
  <circle cx="200" cy="200" r="150" fill="url(#glowGrad)" opacity="0.3"/>

  <!-- Outer decorative circle -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#lavenderGrad)" stroke-width="1" opacity="0.2"/>

  <!-- Main circular background -->
  <circle cx="200" cy="200" r="170" fill="#1e293b" stroke="url(#purpleGrad)" stroke-width="4" filter="url(#shadow)"/>

  <!-- Decorative Book Pages (Archaeologist theme) -->
  <g opacity="0.15">
    <path d="M 50,200 Q 80,180 110,200 L 110,250 Q 80,270 50,250 Z" fill="#a78bfa"/>
    <path d="M 350,200 Q 320,180 290,200 L 290,250 Q 320,270 350,250 Z" fill="#a78bfa"/>
  </g>

  <!-- Central DevOps Gear with depth -->
  <g transform="translate(200, 200)" filter="url(#shadow)">
    <!-- Outer gear ring -->
    <circle r="75" fill="url(#blueGrad)"/>

    <!-- Gear teeth (12 teeth for detail) -->
    <g>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(30)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(60)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(90)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(120)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(150)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(180)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(210)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(240)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(270)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(300)"/>
      <rect x="-8" y="-85" width="16" height="20" fill="#1e40af" rx="3" transform="rotate(330)"/>
    </g>

    <!-- Inner gear details -->
    <circle r="60" fill="#0f172a"/>
    <circle r="55" fill="none" stroke="url(#blueGrad)" stroke-width="3"/>

    <!-- Center hole with depth -->
    <circle r="25" fill="#1e293b"/>
    <circle r="20" fill="#0f172a"/>

    <!-- Small accent dots -->
    <circle cx="0" cy="-40" r="3" fill="#f0abfc"/>
    <circle cx="35" cy="-20" r="3" fill="#f0abfc"/>
    <circle cx="35" cy="20" r="3" fill="#f0abfc"/>
    <circle cx="0" cy="40" r="3" fill="#f0abfc"/>
    <circle cx="-35" cy="20" r="3" fill="#f0abfc"/>
    <circle cx="-35" cy="-20" r="3" fill="#f0abfc"/>
  </g>

  <!-- Beautiful Flower Petals (8 petals) -->
  <g filter="url(#glow)">
    <!-- Top petal -->
    <ellipse cx="200" cy="55" rx="22" ry="38" fill="url(#lavenderGrad)" opacity="0.95"/>
    <ellipse cx="200" cy="50" rx="16" ry="30" fill="#f0abfc" opacity="0.6"/>

    <!-- Top-right petal -->
    <g transform="rotate(45 200 200)">
      <ellipse cx="200" cy="55" rx="22" ry="38" fill="url(#lavenderGrad)" opacity="0.95"/>
      <ellipse cx="200" cy="50" rx="16" ry="30" fill="#f0abfc" opacity="0.6"/>
    </g>

    <!-- Right petal -->
    <g transform="rotate(90 200 200)">
      <ellipse cx="200" cy="55" rx="22" ry="38" fill="url(#lavenderGrad)" opacity="0.95"/>
      <ellipse cx="200" cy="50" rx="16" ry="30" fill="#f0abfc" opacity="0.6"/>
    </g>

    <!-- Bottom-right petal -->
    <g transform="rotate(135 200 200)">
      <ellipse cx="200" cy="55" rx="22" ry="38" fill="url(#lavenderGrad)" opacity="0.95"/>
      <ellipse cx="200" cy="50" rx="16" ry="30" fill="#f0abfc" opacity="0.6"/>
    </g>

    <!-- Bottom petal -->
    <g transform="rotate(180 200 200)">
      <ellipse cx="200" cy="55" rx="22" ry="38" fill="url(#lavenderGrad)" opacity="0.95"/>
      <ellipse cx="200" cy="50" rx="16" ry="30" fill="#f0abfc" opacity="0.6"/>
    </g>

    <!-- Bottom-left petal -->
    <g transform="rotate(225 200 200)">
      <ellipse cx="200" cy="55" rx="22" ry="38" fill="url(#lavenderGrad)" opacity="0.95"/>
      <ellipse cx="200" cy="50" rx="16" ry="30" fill="#f0abfc" opacity="0.6"/>
    </g>

    <!-- Left petal -->
    <g transform="rotate(270 200 200)">
      <ellipse cx="200" cy="55" rx="22" ry="38" fill="url(#lavenderGrad)" opacity="0.95"/>
      <ellipse cx="200" cy="50" rx="16" ry="30" fill="#f0abfc" opacity="0.6"/>
    </g>

    <!-- Top-left petal -->
    <g transform="rotate(315 200 200)">
      <ellipse cx="200" cy="55" rx="22" ry="38" fill="url(#lavenderGrad)" opacity="0.95"/>
      <ellipse cx="200" cy="50" rx="16" ry="30" fill="#f0abfc" opacity="0.6"/>
    </g>
  </g>

  <!-- Multiple Hands Motif -->
  <!-- Detailed hand illustrations around the circle -->
  <g stroke="#f0abfc" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Hand 1: Top -->
    <path d="M 175,25 L 175,45 M 170,30 L 175,25 L 180,30 M 165,35 L 170,30 M 180,30 L 185,35"/>
    <path d="M 225,25 L 225,45 M 220,30 L 225,25 L 230,30 M 215,35 L 220,30 M 230,30 L 235,35"/>

    <!-- Hand 2: Top-right -->
    <g transform="rotate(45 200 200)">
      <path d="M 175,25 L 175,45 M 170,30 L 175,25 L 180,30 M 165,35 L 170,30 M 180,30 L 185,35"/>
    </g>

    <!-- Hand 3: Right -->
    <path d="M 375,175 L 355,175 M 370,170 L 375,175 L 370,180 M 365,165 L 370,170 M 370,180 L 365,185"/>
    <path d="M 375,225 L 355,225 M 370,220 L 375,225 L 370,230 M 365,215 L 370,220 M 370,230 L 365,235"/>

    <!-- Hand 4: Bottom-right -->
    <g transform="rotate(135 200 200)">
      <path d="M 175,25 L 175,45 M 170,30 L 175,25 L 180,30 M 165,35 L 170,30 M 180,30 L 185,35"/>
    </g>

    <!-- Hand 5: Bottom -->
    <path d="M 175,375 L 175,355 M 170,370 L 175,375 L 180,370 M 165,365 L 170,370 M 180,370 L 185,365"/>
    <path d="M 225,375 L 225,355 M 220,370 L 225,375 L 230,370 M 215,365 L 220,370 M 230,370 L 235,365"/>

    <!-- Hand 6: Bottom-left -->
    <g transform="rotate(225 200 200)">
      <path d="M 175,25 L 175,45 M 170,30 L 175,25 L 180,30 M 165,35 L 170,30 M 180,30 L 185,35"/>
    </g>

    <!-- Hand 7: Left -->
    <path d="M 25,175 L 45,175 M 30,170 L 25,175 L 30,180 M 35,165 L 30,170 M 30,180 L 35,185"/>
    <path d="M 25,225 L 45,225 M 30,220 L 25,225 L 30,230 M 35,215 L 30,220 M 30,230 L 35,235"/>

    <!-- Hand 8: Top-left -->
    <g transform="rotate(315 200 200)">
      <path d="M 175,25 L 175,45 M 170,30 L 175,25 L 180,30 M 165,35 L 170,30 M 180,30 L 185,35"/>
    </g>
  </g>

  <!-- Text: NiRo.ai with styling -->
  <g filter="url(#shadow)">
    <text x="200" y="210" font-family="'Arial Black', sans-serif" font-size="48" font-weight="900"
          fill="url(#purpleGrad)" text-anchor="middle" letter-spacing="2">NiRo</text>
    <text x="270" y="210" font-family="'Arial', sans-serif" font-size="36" font-weight="300"
          fill="#a78bfa" text-anchor="middle">.ai</text>
  </g>

  <!-- Subtitle with icon -->
  <text x="200" y="240" font-family="'Arial', sans-serif" font-size="14" font-weight="600"
        fill="#e0e7ff" text-anchor="middle" letter-spacing="1">🌸 NiRo.ai 🌸</text>

  <text x="200" y="260" font-family="'Arial', sans-serif" font-size="12"
        fill="#a78bfa" text-anchor="middle">DevOps Automation</text>

  <!-- Bottom decorative text -->
  <text x="200" y="365" font-family="'Arial', sans-serif" font-size="10" font-style="italic"
        fill="#64748b" text-anchor="middle">"Sprouting solutions across your infrastructure"</text>
</svg>
