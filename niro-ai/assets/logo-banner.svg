<!-- NiRo.ai Banner Logo for GitHub/Documentation -->
<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0abfc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e879f9;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="150" r="80" fill="#7c3aed" opacity="0.1"/>
  <circle cx="1100" cy="150" r="80" fill="#f0abfc" opacity="0.1"/>

  <!-- Left decorative flowers -->
  <g opacity="0.3">
    <circle cx="50" cy="50" r="15" fill="url(#pinkGrad)"/>
    <circle cx="80" cy="80" r="20" fill="url(#purpleGrad)"/>
    <circle cx="40" cy="120" r="12" fill="url(#pinkGrad)"/>
  </g>

  <!-- Right decorative flowers -->
  <g opacity="0.3">
    <circle cx="1150" cy="50" r="15" fill="url(#pinkGrad)"/>
    <circle cx="1120" cy="80" r="20" fill="url(#purpleGrad)"/>
    <circle cx="1160" cy="120" r="12" fill="url(#pinkGrad)"/>
  </g>

  <!-- Central Icon -->
  <g transform="translate(150, 150)">
    <!-- Flower petals -->
    <g filter="url(#glow)">
      <ellipse cx="0" cy="-45" rx="15" ry="25" fill="url(#pinkGrad)" opacity="0.9"/>
      <ellipse cx="32" cy="-32" rx="15" ry="25" fill="url(#pinkGrad)" opacity="0.9" transform="rotate(45 0 0)"/>
      <ellipse cx="45" cy="0" rx="15" ry="25" fill="url(#pinkGrad)" opacity="0.9" transform="rotate(90 0 0)"/>
      <ellipse cx="32" cy="32" rx="15" ry="25" fill="url(#pinkGrad)" opacity="0.9" transform="rotate(135 0 0)"/>
      <ellipse cx="0" cy="45" rx="15" ry="25" fill="url(#pinkGrad)" opacity="0.9" transform="rotate(180 0 0)"/>
      <ellipse cx="-32" cy="32" rx="15" ry="25" fill="url(#pinkGrad)" opacity="0.9" transform="rotate(225 0 0)"/>
      <ellipse cx="-45" cy="0" rx="15" ry="25" fill="url(#pinkGrad)" opacity="0.9" transform="rotate(270 0 0)"/>
      <ellipse cx="-32" cy="-32" rx="15" ry="25" fill="url(#pinkGrad)" opacity="0.9" transform="rotate(315 0 0)"/>
    </g>

    <!-- Central gear -->
    <circle r="30" fill="url(#purpleGrad)"/>
    <circle r="20" fill="#1e293b"/>
    <circle r="10" fill="#0f172a"/>
  </g>

  <!-- Main Title -->
  <g filter="url(#shadow)">
    <text x="320" y="140" font-family="'Arial Black', sans-serif" font-size="80" font-weight="900"
          fill="url(#purpleGrad)" letter-spacing="3">NiRo</text>
    <text x="550" y="140" font-family="'Arial', sans-serif" font-size="64"
          fill="url(#pinkGrad)">.ai</text>
  </g>

  <!-- Flower emoji decoration -->
  <text x="700" y="145" font-size="60">🌸</text>

  <!-- Subtitle -->
  <text x="320" y="185" font-family="'Arial', sans-serif" font-size="28" font-weight="600"
        fill="#e0e7ff" letter-spacing="2">NICO ROBIN AI</text>

  <!-- Description line 1 -->
  <text x="320" y="220" font-family="'Arial', sans-serif" font-size="20"
        fill="#a78bfa">AI-Powered DevOps &amp; Testing Automation</text>

  <!-- Description line 2 -->
  <text x="320" y="250" font-family="'Arial', sans-serif" font-size="16" font-style="italic"
        fill="#64748b">"Sprouting solutions across your infrastructure with multiple hands"</text>

  <!-- Right side feature icons -->
  <g transform="translate(900, 80)">
    <text x="0" y="0" font-size="24">🔧</text>
    <text x="30" y="5" font-family="'Arial', sans-serif" font-size="14" fill="#cbd5e1">CI/CD</text>

    <text x="0" y="40" font-size="24">🧪</text>
    <text x="30" y="45" font-family="'Arial', sans-serif" font-size="14" fill="#cbd5e1">Testing</text>

    <text x="0" y="80" font-size="24">🏗️</text>
    <text x="30" y="85" font-family="'Arial', sans-serif" font-size="14" fill="#cbd5e1">Infrastructure</text>

    <text x="0" y="120" font-size="24">🚀</text>
    <text x="30" y="125" font-family="'Arial', sans-serif" font-size="14" fill="#cbd5e1">Deployment</text>

    <text x="120" y="0" font-size="24">📊</text>
    <text x="150" y="5" font-family="'Arial', sans-serif" font-size="14" fill="#cbd5e1">Monitoring</text>

    <text x="120" y="40" font-size="24">🔒</text>
    <text x="150" y="45" font-family="'Arial', sans-serif" font-size="14" fill="#cbd5e1">Security</text>

    <text x="120" y="80" font-size="24">⚡</text>
    <text x="150" y="85" font-family="'Arial', sans-serif" font-size="14" fill="#cbd5e1">Performance</text>

    <text x="120" y="120" font-size="24">📚</text>
    <text x="150" y="125" font-family="'Arial', sans-serif" font-size="14" fill="#cbd5e1">Knowledge</text>
  </g>
</svg>
