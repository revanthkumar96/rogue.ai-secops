name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, devops, phase2, phase3]
  pull_request:
    branches: [main, develop, devops]
  workflow_dispatch:

env:
  BUN_VERSION: '1.3.0'

jobs:
  # Job 1: Type checking and linting
  typecheck-and-lint:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check - rouge package
        run: |
          cd packages/rouge
          bun run typecheck

      - name: Type check - web package
        run: |
          cd packages/web
          bun run typecheck

      - name: Type check - shared package
        run: |
          cd packages/shared
          bun run typecheck

  # Job 2: Unit tests
  test-rouge:
    name: Test Rouge Package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: |
          cd packages/rouge
          bun test

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/rouge/coverage/coverage.xml
          flags: rouge-package
          name: rouge-${{ matrix.os }}
          fail_ci_if_error: false

  # Job 3: Integration tests with Ollama
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-rouge

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh

      - name: Start Ollama service
        run: |
          ollama serve &
          sleep 5

      - name: Pull test model
        run: ollama pull llama3.2:1b

      - name: Run integration tests
        run: |
          cd packages/rouge
          bun test:integration
        continue-on-error: true

  # Job 4: Build rouge package
  build-rouge:
    name: Build Rouge Package
    runs-on: ubuntu-latest
    needs: [typecheck-and-lint, test-rouge]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build rouge package
        run: |
          cd packages/rouge
          bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rouge-dist
          path: packages/rouge/dist

  # Job 5: Build web UI
  build-web:
    name: Build Web UI
    runs-on: ubuntu-latest
    needs: typecheck-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web UI
        run: |
          cd packages/web
          bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist

  # Job 6: E2E tests for CLI
  test-cli-e2e:
    name: CLI E2E Tests
    runs-on: ubuntu-latest
    needs: build-rouge

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download rouge build
        uses: actions/download-artifact@v4
        with:
          name: rouge-dist
          path: packages/rouge/dist

      - name: Test CLI commands
        run: |
          cd packages/rouge
          bun dev --version
          bun dev --help
          bun dev status || true
          bun dev list agents
          bun dev list skills
          bun dev list abilities

  # Job 7: Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 8: Dependency audit
  audit-dependencies:
    name: Audit Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Audit dependencies
        run: bun audit || true
        continue-on-error: true

  # Job 9: All tests passed
  all-tests-passed:
    name: All Tests Passed ✅
    runs-on: ubuntu-latest
    needs: [typecheck-and-lint, test-rouge, build-rouge, build-web, test-cli-e2e]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.typecheck-and-lint.result }}" != "success" ]; then
            echo "❌ Type check or lint failed"
            exit 1
          fi
          if [ "${{ needs.test-rouge.result }}" != "success" ]; then
            echo "❌ Rouge tests failed"
            exit 1
          fi
          if [ "${{ needs.build-rouge.result }}" != "success" ]; then
            echo "❌ Rouge build failed"
            exit 1
          fi
          if [ "${{ needs.build-web.result }}" != "success" ]; then
            echo "❌ Web build failed"
            exit 1
          fi
          if [ "${{ needs.test-cli-e2e.result }}" != "success" ]; then
            echo "❌ CLI E2E tests failed"
            exit 1
          fi
          echo "✅ All required tests passed!"
          echo "🎉 CI pipeline successful!"
