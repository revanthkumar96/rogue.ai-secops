name: Release

on:
  push:
    tags:
      - "v*"

env:
  BUN_VERSION: "1.3.11"

permissions:
  contents: write

jobs:
  ci:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Typecheck
        run: |
          cd packages/shared && bun run typecheck
          cd ../rouge && bun run typecheck
          cd ../web && bun run typecheck

      - name: Test
        run: cd packages/rouge && bun test --timeout 30000
        continue-on-error: true

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: darwin-arm64
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: windows-x64
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Build
        run: cd packages/rouge && bun run build

      - name: Compile binary
        run: cd packages/rouge && bun build src/index.ts --compile --outfile rouge-${{ matrix.target }}${{ matrix.ext }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: cd packages/rouge && tar -czf rouge-${{ matrix.target }}.tar.gz rouge-${{ matrix.target }}${{ matrix.ext }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: cd packages/rouge; Compress-Archive -Path rouge-${{ matrix.target }}${{ matrix.ext }} -DestinationPath rouge-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rouge-${{ matrix.target }}
          path: packages/rouge/rouge-${{ matrix.target }}.${{ matrix.archive }}

  build-web:
    name: Build Web UI
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Build Web UI
        run: cd packages/web && bun run build

      - name: Package
        run: cd packages/web && tar -czf rouge-web-ui.tar.gz dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rouge-web-ui
          path: packages/web/rouge-web-ui.tar.gz

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-web]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changes }}

            ## Downloads

            | Platform | File |
            |----------|------|
            | Linux x64 | `rouge-linux-x64.tar.gz` |
            | macOS ARM64 | `rouge-darwin-arm64.tar.gz` |
            | Windows x64 | `rouge-windows-x64.zip` |
            | Web UI | `rouge-web-ui.tar.gz` |

            ## Quick Start

            ```bash
            # Extract and run
            tar -xzf rouge-linux-x64.tar.gz
            ./rouge-linux-x64 --version

            # Or install from source
            git clone <repo> && cd rouge
            bun install && bun run start
            ```
          files: |
            release-assets/rouge-linux-x64/*
            release-assets/rouge-darwin-arm64/*
            release-assets/rouge-windows-x64/*
            release-assets/rouge-web-ui/*
