name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  BUN_VERSION: '1.3.0'

jobs:
  # Job 1: Create release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s (%h)" > CHANGELOG.txt
          cat CHANGELOG.txt

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Rouge v${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG.txt
          draft: false
          prerelease: false

  # Job 2: Build and upload CLI (Linux)
  build-cli-linux:
    name: Build CLI - Linux
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: |
          cd packages/rouge
          bun run build

      - name: Create binary
        run: |
          cd packages/rouge
          bun build src/index.ts --compile --outfile rouge-linux-x64

      - name: Package binary
        run: |
          cd packages/rouge
          tar -czf rouge-linux-x64.tar.gz rouge-linux-x64
          sha256sum rouge-linux-x64.tar.gz > rouge-linux-x64.tar.gz.sha256

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./packages/rouge/rouge-linux-x64.tar.gz
          asset_name: rouge-linux-x64.tar.gz
          asset_content_type: application/gzip

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./packages/rouge/rouge-linux-x64.tar.gz.sha256
          asset_name: rouge-linux-x64.tar.gz.sha256
          asset_content_type: text/plain

  # Job 3: Build and upload CLI (macOS)
  build-cli-macos:
    name: Build CLI - macOS
    runs-on: macos-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: |
          cd packages/rouge
          bun run build

      - name: Create binary
        run: |
          cd packages/rouge
          bun build src/index.ts --compile --outfile rouge-darwin-x64

      - name: Package binary
        run: |
          cd packages/rouge
          tar -czf rouge-darwin-x64.tar.gz rouge-darwin-x64
          shasum -a 256 rouge-darwin-x64.tar.gz > rouge-darwin-x64.tar.gz.sha256

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./packages/rouge/rouge-darwin-x64.tar.gz
          asset_name: rouge-darwin-x64.tar.gz
          asset_content_type: application/gzip

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./packages/rouge/rouge-darwin-x64.tar.gz.sha256
          asset_name: rouge-darwin-x64.tar.gz.sha256
          asset_content_type: text/plain

  # Job 4: Build and upload CLI (Windows)
  build-cli-windows:
    name: Build CLI - Windows
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: |
          cd packages/rouge
          bun run build

      - name: Create binary
        run: |
          cd packages/rouge
          bun build src/index.ts --compile --outfile rouge-windows-x64.exe

      - name: Package binary
        run: |
          cd packages/rouge
          7z a rouge-windows-x64.zip rouge-windows-x64.exe
          certutil -hashfile rouge-windows-x64.zip SHA256 > rouge-windows-x64.zip.sha256

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./packages/rouge/rouge-windows-x64.zip
          asset_name: rouge-windows-x64.zip
          asset_content_type: application/zip

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./packages/rouge/rouge-windows-x64.zip.sha256
          asset_name: rouge-windows-x64.zip.sha256
          asset_content_type: text/plain

  # Job 5: Build and upload Web UI
  build-web-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Web UI
        run: |
          cd packages/web
          bun run build

      - name: Package Web UI
        run: |
          cd packages/web
          tar -czf rouge-web-ui.tar.gz dist/
          sha256sum rouge-web-ui.tar.gz > rouge-web-ui.tar.gz.sha256

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./packages/web/rouge-web-ui.tar.gz
          asset_name: rouge-web-ui.tar.gz
          asset_content_type: application/gzip

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./packages/web/rouge-web-ui.tar.gz.sha256
          asset_name: rouge-web-ui.tar.gz.sha256
          asset_content_type: text/plain

  # Job 6: Publish to npm (optional)
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: create-release
    if: false  # Disabled by default, enable when ready

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: |
          cd packages/rouge
          bun run build
          cd ../web
          bun run build

      - name: Publish to npm
        run: |
          cd packages/rouge
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Job 7: Create Docker images (future)
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: create-release
    if: false  # Disabled by default, enable when Docker support is added

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            rouge/rouge:latest
            rouge/rouge:${{ needs.create-release.outputs.version }}

  # Job 8: Notify release
  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [build-cli-linux, build-cli-macos, build-cli-windows, build-web-ui]
    if: always()

    steps:
      - name: Send notification
        run: |
          echo "🎉 Rouge v${{ needs.create-release.outputs.version }} has been released!"
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"
