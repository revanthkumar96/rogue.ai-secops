name: Web UI Tests

on:
  push:
    branches: [main, develop, devops]
    paths:
      - 'packages/web/**'
      - '.github/workflows/test-web.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/web/**'
  workflow_dispatch:

env:
  BUN_VERSION: '1.3.0'

jobs:
  # Job 1: Build web UI
  build:
    name: Build Web UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: |
          cd packages/web
          bun run typecheck

      - name: Build
        run: |
          cd packages/web
          bun run build

      - name: Check build size
        run: |
          cd packages/web/dist
          du -sh .
          echo "Build size:"
          du -sh assets

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/web/dist
          retention-days: 7

  # Job 2: Unit tests (if any)
  test:
    name: Web UI Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: |
          cd packages/web
          bun test || echo "No tests configured yet"
        continue-on-error: true

  # Job 3: E2E tests with Playwright
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Start API server
        run: |
          cd packages/rouge
          bun dev serve &
          sleep 5
        continue-on-error: true

      - name: Start web dev server
        run: |
          cd packages/web
          bun dev &
          sleep 10

      - name: Wait for servers
        run: |
          timeout 30 bash -c 'until curl -s http://localhost:3000/health > /dev/null; do sleep 1; done' || true
          timeout 30 bash -c 'until curl -s http://localhost:3001 > /dev/null; do sleep 1; done' || true

      - name: Run E2E tests
        run: |
          cd packages/web
          bunx playwright test || echo "No E2E tests configured yet"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            packages/web/playwright-report
            packages/web/test-results
          retention-days: 7

  # Job 4: Lighthouse CI
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/web/dist

      - name: Install http-server
        run: npm install -g http-server

      - name: Start static server
        run: |
          cd packages/web/dist
          http-server -p 8080 &
          sleep 5

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: 'http://localhost:8080'
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Job 5: Bundle analysis
  analyze-bundle:
    name: Analyze Bundle Size
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/web/dist

      - name: Analyze bundle
        run: |
          cd packages/web/dist/assets
          echo "=== Bundle Analysis ==="
          echo "JavaScript files:"
          find . -name "*.js" -type f -exec du -h {} \; | sort -h
          echo ""
          echo "CSS files:"
          find . -name "*.css" -type f -exec du -h {} \;
          echo ""
          echo "Total size:"
          du -sh .

      - name: Comment PR with bundle size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const size = execSync('du -sh packages/web/dist/assets').toString().split('\t')[0];

            const comment = `### 📦 Bundle Size Report\n\n` +
              `Total bundle size: **${size}**\n\n` +
              `Build artifacts uploaded for review.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 6: All checks passed
  all-checks-passed:
    name: All Web Tests Passed ✅
    runs-on: ubuntu-latest
    needs: [build, test, lighthouse, analyze-bundle]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          if [ "${{ needs.lighthouse.result }}" != "success" ]; then
            echo "⚠️ Lighthouse check had issues (not blocking)"
          fi
          echo "✅ All web UI checks passed!"
